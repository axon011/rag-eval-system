<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Q&A System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; }
        h1 { font-size: 2rem; margin-bottom: 8px; background: linear-gradient(90deg, #00d9ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { color: #888; font-size: 0.9rem; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .tabs { display: flex; gap: 8px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab { padding: 10px 20px; background: transparent; border: none; color: #888; cursor: pointer; font-size: 0.9rem; border-radius: 8px; transition: all 0.2s ease; }
        .tab:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .tab.active { color: #00d9ff; background: rgba(0, 217, 255, 0.15); }
        .panel { display: none; background: rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; backdrop-filter: blur(10px); }
        .panel.active { display: block; }
        .upload-area { border: 2px dashed #444; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .upload-area:hover, .upload-area.dragover { border-color: #00d9ff; background: rgba(0, 217, 255, 0.05); }
        .upload-icon { font-size: 40px; margin-bottom: 15px; }
        .upload-text { color: #aaa; margin-bottom: 12px; font-size: 0.9rem; }
        .upload-btn { background: linear-gradient(90deg, #00d9ff, #00ff88); border: none; padding: 10px 24px; border-radius: 8px; color: #000; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .upload-btn:hover { transform: scale(1.05); }
        #fileInput { display: none; }
        .status { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; font-size: 0.9rem; }
        .status.success { background: rgba(0, 255, 136, 0.1); border: 1px solid #00ff88; color: #00ff88; }
        .status.error { background: rgba(255, 68, 68, 0.1); border: 1px solid #ff4444; color: #ff4444; }
        .status.loading { background: rgba(0, 217, 255, 0.1); border: 1px solid #00d9ff; color: #00d9ff; }
        .chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .chat-stats { font-size: 0.8rem; color: #666; }
        .clear-btn { background: transparent; border: 1px solid #444; color: #888; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .clear-btn:hover { border-color: #ff4444; color: #ff4444; }
        .chat-container { display: flex; flex-direction: column; gap: 16px; height: 55vh; }
        .messages { flex: 1; overflow-y: auto; padding: 16px; background: rgba(0,0,0,0.3); border-radius: 12px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .message { padding: 12px 16px; border-radius: 12px; max-width: 85%; animation: fadeIn 0.2s ease; word-wrap: break-word; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; background: linear-gradient(135deg, #00d9ff, #0099ff); color: #000; }
        .message.assistant { align-self: flex-start; background: rgba(255,255,255,0.1); }
        .message .actions { display: flex; gap: 8px; margin-top: 8px; opacity: 0; transition: opacity 0.2s; }
        .message:hover .actions { opacity: 1; }
        .action-btn { background: rgba(255,255,255,0.1); border: none; color: #888; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .action-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .message .sources { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; color: #888; }
        .message .source-item { padding: 6px 10px; background: rgba(0,0,0,0.2); border-radius: 4px; margin-top: 6px; font-size: 0.75rem; }
        .message .source-header { display: flex; justify-content: space-between; color: #00d9ff; margin-bottom: 4px; }
        .input-area { display: flex; gap: 10px; align-items: center; }
        #questionInput { flex: 1; padding: 12px 16px; border: 1px solid #333; border-radius: 10px; background: rgba(0,0,0,0.3); color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        #questionInput:focus { border-color: #00d9ff; }
        #questionInput:disabled { opacity: 0.5; }
        #sendBtn { padding: 12px 24px; background: linear-gradient(90deg, #00d9ff, #00ff88); border: none; border-radius: 10px; color: #000; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        #sendBtn:hover:not(:disabled) { transform: scale(1.05); }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        .empty-state { text-align: center; color: #555; padding: 40px; }
        .service-status { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .service-badge { padding: 6px 12px; background: rgba(255,255,255,0.08); border-radius: 16px; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
        .service-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #00ff88; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .latency { font-size: 0.75rem; color: #666; margin-top: 6px; }
        .cached-badge { display: inline-block; background: rgba(0, 255, 136, 0.2); color: #00ff88; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; margin-left: 8px; }
        .progress-bar { height: 4px; background: #333; border-radius: 2px; margin-top: 10px; overflow: hidden; display: none; }
        .progress-bar.active { display: block; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00d9ff, #00ff88); width: 0%; transition: width 0.3s; animation: progress 1.5s ease-in-out infinite; }
        @keyframes progress { 0% { width: 0%; margin-left: 0%; } 50% { width: 50%; margin-left: 25%; } 100% { width: 0%; margin-left: 100%; } }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.2); border-top-color: currentColor; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tooltip { position: relative; }
        .tooltip::after { content: attr(data-tooltip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .tooltip:hover::after { opacity: 1; }
        .kbd { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; color: #888; }
        .settings-btn { background: transparent; border: 1px solid #444; color: #888; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .settings-btn:hover { border-color: #00d9ff; color: #00d9ff; }
        .settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .settings-modal.active { display: flex; }
        .settings-content { background: #1a1a2e; border: 1px solid #333; border-radius: 16px; padding: 30px; max-width: 450px; width: 90%; }
        .settings-title { font-size: 1.2rem; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .settings-close { background: none; border: none; color: #888; cursor: pointer; font-size: 1.5rem; }
        .settings-close:hover { color: #fff; }
        .settings-group { margin-bottom: 20px; }
        .settings-label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #888; }
        .settings-input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
        .settings-input:focus { border-color: #00d9ff; }
        .settings-input::placeholder { color: #555; }
        .settings-hint { font-size: 0.75rem; color: #666; margin-top: 6px; }
        .settings-save { width: 100%; padding: 12px; background: linear-gradient(90deg, #00d9ff, #00ff88); border: none; border-radius: 8px; color: #000; font-weight: 600; cursor: pointer; }
        .settings-save:hover { transform: scale(1.02); }
        .api-key-status { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 0.8rem; }
        .api-key-status.set { color: #00ff88; }
        .api-key-status.not-set { color: #888; }
        .api-provider { display: flex; gap: 8px; margin-bottom: 12px; }
        .provider-btn { flex: 1; padding: 10px; border: 1px solid #333; border-radius: 8px; background: transparent; color: #888; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
        .provider-btn:hover { border-color: #555; }
        .provider-btn.active { border-color: #00d9ff; color: #00d9ff; background: rgba(0, 217, 255, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>RAG Q&A System</h1>
            <p class="subtitle">Production Retrieval-Augmented Generation with Evaluation</p>
        </header>

        <div class="top-bar">
            <div class="tabs">
                <button class="tab active" data-tab="query">Query</button>
                <button class="tab" data-tab="upload">Upload</button>
                <button class="tab" data-tab="settings">Settings</button>
            </div>
            <div class="service-status">
                <div class="service-badge"><span class="dot"></span>FastAPI</div>
                <div class="service-badge"><span class="dot"></span>Ollama</div>
                <div class="service-badge"><span class="dot"></span>Qdrant</div>
                <div class="service-badge"><span class="dot"></span>MLflow</div>
            </div>
        </div>

        <div id="query" class="panel active">
            <div class="chat-container">
                <div class="chat-header">
                    <div class="chat-stats" id="chatStats">0 messages</div>
                    <button class="clear-btn" id="clearBtn" title="Clear chat (Ctrl+Shift+C)">Clear</button>
                </div>
                <div class="messages" id="messages">
                    <div class="empty-state">Ask a question about your uploaded documents...</div>
                </div>
                <div class="input-area">
                    <input type="text" id="questionInput" placeholder="Ask a question... (Ctrl+Enter to send)" autocomplete="off">
                    <button id="sendBtn">Send</button>
                </div>
            </div>
        </div>

        <div id="upload" class="panel">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📄</div>
                <p class="upload-text">Drag & drop PDF, MD, or TXT files</p>
                <p class="upload-text">or</p>
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Choose File</button>
                <input type="file" id="fileInput" accept=".pdf,.md,.markdown,.txt">
            </div>
            <div class="progress-bar" id="uploadProgress"><div class="progress-fill"></div></div>
            <div class="status" id="uploadStatus"></div>
        </div>

        <div id="settings" class="panel">
            <div class="settings-group">
                <label class="settings-label">LLM Provider</label>
                <div class="api-provider">
                    <button class="provider-btn active" data-provider="ollama">Ollama (Local)</button>
                    <button class="provider-btn" data-provider="openai">OpenAI</button>
                    <button class="provider-btn" data-provider="anthropic">Anthropic</button>
                </div>
            </div>
            <div class="settings-group" id="apiKeyGroup" style="display: none;">
                <label class="settings-label">API Key</label>
                <input type="password" class="settings-input" id="apiKeyInput" placeholder="sk-...">
                <div class="settings-hint" id="apiKeyHint"></div>
                <div class="api-key-status not-set" id="apiKeyStatus">No API key set</div>
            </div>
            <div class="settings-group">
                <label class="settings-label">Model</label>
                <input type="text" class="settings-input" id="modelInput" placeholder="llama3.2" value="llama3.2">
            </div>
            <div class="settings-group">
                <label class="settings-label">Retrieval Mode</label>
                <select class="settings-input" id="retrievalMode">
                    <option value="hybrid">Hybrid (Dense + Sparse)</option>
                    <option value="dense">Dense (Semantic)</option>
                    <option value="sparse">Sparse (BM25)</option>
                </select>
            </div>
            <div class="settings-group">
                <label class="settings-label">Max Chunks</label>
                <input type="number" class="settings-input" id="maxChunks" placeholder="5" value="5" min="1" max="20">
            </div>
            <button class="settings-save" id="saveSettings">Save Settings</button>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let messageCount = 0;
        let isLoading = false;
        let abortController = null;
        
        // Settings state
        let settings = {
            provider: localStorage.getItem('provider') || 'ollama',
            apiKey: localStorage.getItem('apiKey') || '',
            model: localStorage.getItem('model') || 'llama3.2',
            retrievalMode: localStorage.getItem('retrievalMode') || 'hybrid',
            maxChunks: parseInt(localStorage.getItem('maxChunks')) || 5
        };

        // Initialize settings UI
        function initSettings() {
            document.querySelectorAll('.provider-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.provider === settings.provider);
            });
            document.getElementById('apiKeyInput').value = settings.apiKey;
            document.getElementById('modelInput').value = settings.model;
            document.getElementById('retrievalMode').value = settings.retrievalMode;
            document.getElementById('maxChunks').value = settings.maxChunks;
            updateApiKeyUI();
        }

        function updateApiKeyUI() {
            const apiKeyGroup = document.getElementById('apiKeyGroup');
            const apiKeyStatus = document.getElementById('apiKeyStatus');
            const apiKeyHint = document.getElementById('apiKeyHint');
            
            if (settings.provider === 'ollama') {
                apiKeyGroup.style.display = 'none';
            } else {
                apiKeyGroup.style.display = 'block';
                if (settings.apiKey) {
                    apiKeyStatus.className = 'api-key-status set';
                    apiKeyStatus.textContent = '✓ API key set';
                } else {
                    apiKeyStatus.className = 'api-key-status not-set';
                    apiKeyStatus.textContent = 'No API key set';
                }
            }
            
            // Update hint based on provider
            if (settings.provider === 'openai') {
                apiKeyHint.textContent = 'Get your key from: https://platform.openai.com/api-keys';
            } else if (settings.provider === 'anthropic') {
                apiKeyHint.textContent = 'Get your key from: https://console.anthropic.com/settings/keys';
            }
        }

        // Debounce helper
        function debounce(fn, delay) {
            let timeout;
            return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => fn(...args), delay); };
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });

        // File upload with progress
        const fileInput = document.getElementById('fileInput');
        const uploadStatus = document.getElementById('uploadStatus');
        const uploadProgress = document.getElementById('uploadProgress');
        const uploadArea = document.getElementById('uploadArea');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            uploadStatus.style.display = 'block';
            uploadStatus.className = 'status loading';
            uploadStatus.innerHTML = '<span class="spinner"></span>Uploading and processing...';
            uploadProgress.classList.add('active');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_BASE}/ingest/`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (response.ok) {
                    uploadStatus.className = 'status success';
                    uploadStatus.innerHTML = `✅ Indexed <strong>${data.chunks_indexed}</strong> chunks using <em>${data.embed_model}</em>`;
                } else {
                    throw new Error(data.detail || 'Upload failed');
                }
            } catch (error) {
                uploadStatus.className = 'status error';
                uploadStatus.innerHTML = `❌ Error: ${error.message} <button class="action-btn" onclick="this.closest('input').click()">Retry</button>`;
            } finally {
                uploadProgress.classList.remove('active');
                fileInput.value = '';
            }
        });

        // Drag and drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            uploadArea.addEventListener(evt, e => { e.preventDefault(); });
        });
        uploadArea.addEventListener('dragenter', () => uploadArea.classList.add('dragover'));
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', e => {
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                const validTypes = ['application/pdf', 'text/markdown', 'text/plain', 'text/x-markdown'];
                const validExts = ['.pdf', '.md', '.markdown', '.txt'];
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (validTypes.includes(file.type) || validExts.includes(ext)) {
                    fileInput.files = e.dataTransfer.files;
                    fileInput.dispatchEvent(new Event('change'));
                } else {
                    uploadStatus.style.display = 'block';
                    uploadStatus.className = 'status error';
                    uploadStatus.textContent = '❌ Unsupported file type. Use PDF, MD, or TXT.';
                }
            }
        });

        // Chat functionality
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const messages = document.getElementById('messages');
        const clearBtn = document.getElementById('clearBtn');
        const chatStats = document.getElementById('chatStats');

        function updateStats() {
            chatStats.textContent = `${messageCount} message${messageCount !== 1 ? 's' : ''}`;
        }

        async function sendQuestion() {
            if (isLoading) {
                if (abortController) abortController.abort();
                return;
            }
            const question = questionInput.value.trim();
            if (!question) return;

            isLoading = true;
            sendBtn.disabled = false;
            sendBtn.innerHTML = '<span class="spinner" style="border-color:rgba(0,0,0,0.2);border-top-color:#000"></span>';
            questionInput.disabled = true;

            addMessage(question, 'user');
            questionInput.value = '';
            const loadingMsg = addMessage('<span class="spinner"></span>Thinking...', 'assistant');

            abortController = new AbortController();

            // Build request body with settings
            const requestBody = {
                question,
                model: settings.model,
                retrieval_mode: settings.retrievalMode,
                max_chunks: settings.maxChunks
            };

            // Add API key if set for external providers
            if (settings.provider !== 'ollama' && settings.apiKey) {
                requestBody.api_key = settings.apiKey;
                requestBody.provider = settings.provider;
            }

            try {
                const response = await fetch(`${API_BASE}/query/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody),
                    signal: abortController.signal
                });

                const data = await response.json();
                loadingMsg.remove();

                if (response.ok) {
                    messageCount += 2;
                    updateStats();
                    const answerDiv = addMessage(data.answer, 'assistant');

                    if (data.cached) {
                        const cachedBadge = document.createElement('span');
                        cachedBadge.className = 'cached-badge';
                        cachedBadge.textContent = 'CACHED';
                        answerDiv.querySelector('.meta')?.appendChild(cachedBadge) || answerDiv.insertAdjacentElement('afterbegin', cachedBadge);
                    }

                    if (data.sources?.length) {
                        const sourcesDiv = document.createElement('div');
                        sourcesDiv.className = 'sources';
                        sourcesDiv.innerHTML = '<strong>Sources:</strong>';
                        data.sources.forEach((src, i) => {
                            sourcesDiv.innerHTML += `
                                <div class="source-item">
                                    <div class="source-header"><span>Source ${i+1}</span><span>${(src.score * 100).toFixed(1)}%</span></div>
                                    ${src.text.substring(0, 200)}${src.text.length > 200 ? '...' : ''}
                                </div>`;
                        });
                        answerDiv.appendChild(sourcesDiv);
                    }

                    if (data.latency_ms) {
                        const latency = document.createElement('div');
                        latency.className = 'latency';
                        latency.innerHTML = `Latency: ${Math.round(data.latency_ms)}ms | Mode: ${data.retrieval_mode}`;
                        answerDiv.appendChild(latency);
                    }

                    // Add copy button
                    const actions = document.createElement('div');
                    actions.className = 'actions';
                    actions.innerHTML = `
                        <button class="action-btn" onclick="copyMessage(this)">Copy</button>
                        <button class="action-btn" onclick="regenerateMessage(this, '${data.answer.replace(/'/g, "\\'")}')">Retry</button>`;
                    answerDiv.appendChild(actions);
                } else {
                    addMessage(`❌ Error: ${data.detail}`, 'assistant');
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    loadingMsg.innerHTML = '<em style="color:#888">Request cancelled</em>';
                } else {
                    loadingMsg.remove();
                    addMessage(`❌ Error: ${error.message}`, 'assistant');
                }
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
                questionInput.disabled = false;
                questionInput.focus();
                abortController = null;
            }
        }

        function addMessage(html, type) {
            const emptyState = messages.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `<div class="content">${html}</div>`;
            messages.appendChild(div);
            messages.scrollTo({ top: messages.scrollHeight, behavior: 'smooth' });
            return div;
        }

        // Copy to clipboard
        window.copyMessage = function(btn) {
            const text = btn.closest('.message').querySelector('.content').innerText.replace('CopyRetry', '').trim();
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 1500);
            });
        };

        // Regenerate (re-send last question)
        window.regenerateMessage = function(btn, lastAnswer) {
            btn.closest('.message').remove();
            messageCount -= 2;
            updateStats();
            sendQuestion();
        };

        // Clear chat
        clearBtn.addEventListener('click', () => {
            messages.innerHTML = '<div class="empty-state">Ask a question about your uploaded documents...</div>';
            messageCount = 0;
            updateStats();
        });

        // Event listeners
        sendBtn.addEventListener('click', sendQuestion);
        questionInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (e.ctrlKey) sendQuestion();
                else sendQuestion();
            }
            if (e.key === 'Escape' && isLoading && abortController) {
                abortController.abort();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.shiftKey && e.key === 'C') {
                e.preventDefault();
                clearBtn.click();
            }
            if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                document.querySelector('.tab[data-tab="upload"]').click();
            }
        });

        // Auto-focus input on load
        questionInput.focus();

        // Settings functionality
        document.querySelectorAll('.provider-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.provider-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                settings.provider = btn.dataset.provider;
                updateApiKeyUI();
            });
        });

        document.getElementById('saveSettings').addEventListener('click', () => {
            settings.apiKey = document.getElementById('apiKeyInput').value;
            settings.model = document.getElementById('modelInput').value;
            settings.retrievalMode = document.getElementById('retrievalMode').value;
            settings.maxChunks = parseInt(document.getElementById('maxChunks').value);
            
            localStorage.setItem('provider', settings.provider);
            localStorage.setItem('apiKey', settings.apiKey);
            localStorage.setItem('model', settings.model);
            localStorage.setItem('retrievalMode', settings.retrievalMode);
            localStorage.setItem('maxChunks', settings.maxChunks);
            
            updateApiKeyUI();
            document.querySelector('.tab[data-tab="query"]').click();
        });

        // Initialize settings on load
        initSettings();
    </script>
</body>
</html>
